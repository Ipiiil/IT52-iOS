name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          xcodebuild build \
            -project IT52-iOS.xcodeproj \
            -scheme IT52-iOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find and copy .app
        run: |
          find DerivedData -name "*.app" -exec cp -R {} Payload/ \;

      - name: Create Payload folder
        run: mkdir -p Payload

      - name: Create IPA
        run: |
          zip -r IT52-iOS.ipa Payload

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT52-iOS
          path: IT52-iOS.ipa
