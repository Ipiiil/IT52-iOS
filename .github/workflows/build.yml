name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          xcodebuild build \
            -project IT52-iOS.xcodeproj \
            -scheme IT52-iOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find and verify .app
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found!"
            exit 1
          fi
          echo "✅ Found .app at: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create Payload folder
        run: |
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ls -la Payload/

      - name: Create IPA
        run: |
          zip -r IT52-iOS.ipa Payload
          ls -la IT52-iOS.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IT52-iOS
          path: IT52-iOS.ipa
